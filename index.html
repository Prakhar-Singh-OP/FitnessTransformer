const { useMemo, useState, useEffect, useRef } = React;

function parseTimeToken(m) {
  let h = Number(m[1]);
  const min = Number(m[2] || 0);
  const p = m[3];
  if (p === 'pm' && h !== 12) h += 12;
  if (p === 'am' && h === 12) h = 0;
  return h + min / 60;
}

function parseWorkoutRange(workoutTime) {
  const cleaned = workoutTime.toLowerCase().trim();
  const all = [...cleaned.matchAll(/(\d+)(?::(\d+))?\s*(am|pm)/g)];
  if (all.length === 0) return null;
  const start = parseTimeToken(all[0]);
  const end = all.length > 1 ? parseTimeToken(all[1]) : null;
  return { start, end };
}

function formatTime(hour24) {
  const total = Math.round((((hour24 % 24) + 24) % 24) * 60);
  const h = Math.floor(total / 60);
  const m = total % 60;
  const period = h >= 12 ? 'PM' : 'AM';
  const displayH = h % 12 || 12;
  const displayM = m.toString().padStart(2, '0');
  return `${displayH}:${displayM} ${period}`;
}

function parseMealHour(timing) {
  const m = timing.match(/(\d+):(\d+)\s*(AM|PM)/i);
  if (!m) return 99;
  let h = Number(m[1]);
  const min = Number(m[2]);
  const p = m[3].toLowerCase();
  if (p === 'pm' && h !== 12) h += 12;
  if (p === 'am' && h === 12) h = 0;
  return h + min / 60;
}

}

function applyWorkoutTimings(meals, workoutTime) {
  const range = parseWorkoutRange(workoutTime);
  if (!range) return meals;

  const { start, end } = range;
  const isMorning = start < 12;
  const preHour = start - 0.75;
  const postHour = end !== null ? end + 0.5 : start + 2.0;
  const breakfastHour = isMorning ? postHour + 0.75 : 7;
  const workoutEndHour = end !== null ? end : start + 1.5;

  const updated = meals
    .filter((meal) => {
      if (!meal.timing.includes('Afternoon Snack')) return true;
      const snackH = parseMealHour(meal.timing);
      return snackH < start || snackH > workoutEndHour;
    })
    .map((meal) => {
      if (meal.timing.includes('Pre Workout'))
        return { ...meal, timing: `${formatTime(preHour)} — Pre Workout` };
      if (meal.timing.includes('Post Workout'))
        return { ...meal, timing: `${formatTime(postHour)} — Post Workout` };
      if (meal.timing.includes('Breakfast') && isMorning)
        return { ...meal, timing: `${formatTime(breakfastHour)} — Breakfast` };
      return meal;
    });

  return [...updated].sort((a, b) => parseMealHour(a.timing) - parseMealHour(b.timing));
}

const FIXED_QTY = new Set(['Black Coffee', 'Green Tea', 'Honey', 'Ghee', 'Butter', 'Olive Oil']);

function scaleFood(food, factor) {
  if (FIXED_QTY.has(food.name) || Math.abs(factor - 1) < 0.02) return food;

  const scaledCal = Math.round(food.cal * factor);
  const scaledPro = Math.round(food.pro * factor);

  const gMatch = food.qty.match(/^(\d+)g$/);
  if (gMatch) {
    const scaled = Math.max(5, Math.round(Number(gMatch[1]) * factor / 5) * 5);
    return { name: food.name, qty: `${scaled}g`, cal: scaledCal, pro: scaledPro };
  }

  const mlMatch = food.qty.match(/^(\d+)ml$/);
  if (mlMatch) {
    const scaled = Math.max(25, Math.round(Number(mlMatch[1]) * factor / 25) * 25);
    return { name: food.name, qty: `${scaled}ml`, cal: scaledCal, pro: scaledPro };
  }

  const countMatch = food.qty.match(/^(\d+)\s+(.+)$/);
  if (countMatch) {
    const base = Number(countMatch[1]);
    const unit = countMatch[2];
    const scaled = Math.max(1, Math.round(base * factor));
    const realFactor = scaled / base;
    return {
      name: food.name,
      qty: `${scaled} ${unit}`,
      cal: Math.round(food.cal * realFactor),
      pro: Math.round(food.pro * realFactor),
    };
  }

  return { name: food.name, qty: food.qty, cal: scaledCal, pro: scaledPro };
}

function compose(items) {
  return {
    meal: items.map((i) => i.name).join(' + '),
    quantity: items.map((i) => i.qty).join(' + '),
    nutrition: `${items.reduce((s, i) => s + i.cal, 0)} kcal | ${Math.round(items.reduce((s, i) => s + i.pro, 0))}g Protein`,
  };
}

      ? [F.eggs4, F.oats80, F.milk250, F.banana2, F.pb30]
      : [F.eggs4, F.oats100, F.milk250, F.banana2, F.almonds30, F.pb30];

    lunch = bl === 1
      ? [F.rice200, F.eggs3, F.dal150, F.salad100]
      : bl === 2
      ? [F.rice250, F.chicken150, F.greenPeas100, F.salad100]
      : [F.brownRice200, F.salmon150, F.broccoli100, F.salad100, F.curd100];

    pre = bl === 1
      ? [F.banana2, F.blackCoffee]
      : bl === 2
      ? [F.banana2, F.dates3, F.blackCoffee]
      : [F.banana2, F.dates3, F.mango100, F.blackCoffee];

    post = bl === 1
      ? [F.eggs3, F.rice200]
      : bl === 2
      ? [F.chicken120, F.sweetPotato, F.curd100]
      : [F.chicken150, F.brownRice200, F.curd200, F.dryFruits30];

    dinner = bl === 1
      ? [F.roti3, F.dal150, F.eggs3, F.spinach100]
      : bl === 2
      ? [F.roti4, F.chicken150, F.mixedVeg150]
      : [F.roti4, F.fish150, F.broccoli100, F.spinach100, F.almonds30];

    snack = bl === 1
      ? [F.banana1, F.peanuts30]
      : bl === 2
      ? [F.eggs3, F.apple1]
      : [F.eggs3, F.curd100, F.almonds30];
  } else if (isOmni) {
    breakfast = bl === 1
      ? [F.eggs3, F.oats80, F.banana2, F.milk250]
      : bl === 2
      ? [F.eggs4, F.oats80, F.milk250, F.banana2, F.pb30, F.curd100]
      : [F.eggs4, F.oats100, F.milk250, F.banana2, F.almonds30, F.cashews30];

    lunch = bl === 1
      ? [F.rice200, F.eggs3, F.dal150, F.salad100]
      : bl === 2
      ? [F.rice250, F.chicken150, F.dal150, F.salad100]
      : [F.brownRice200, F.salmon150, F.chana100, F.broccoli100, F.curd100];

    pre = bl === 1
      ? [F.banana2, F.blackCoffee]
      : bl === 2
      ? [F.banana2, F.dates3, F.blackCoffee]
      : [F.banana2, F.dates3, F.bananaShake];

    post = bl === 1
      ? [F.eggs3, F.rice200, F.curd100]
      : bl === 2
      ? [F.chicken120, F.sweetPotato, F.curd100]
      : [F.chicken150, F.paneer100, F.brownRice200, F.curd200];

    dinner = bl === 1
      ? [F.roti3, F.dal150, F.eggs3, F.spinach100]
      : bl === 2
      ? [F.roti4, F.chicken150, F.mixedVeg150, F.curd100]
      : [F.roti4, F.fish150, F.paneer100, F.broccoli100, F.dryFruits30];

    snack = bl === 1
      ? [F.banana1, F.peanuts30]
      : bl === 2
      ? [F.eggs3, F.curd100, F.apple1]
      : [F.eggs3, F.curd100, F.almonds30, F.apple1];
  } else {
    return [{ timing: 'No Diet Selected', meal: 'Please select a Diet Type above', quantity: '—', nutrition: '—' }];
  }

  return [
    { timing: '7:00 AM — Breakfast', ...compose(breakfast.map((f) => scaleFood(f, scaleFactor))) },
    { timing: '1:00 PM — Lunch', ...compose(lunch.map((f) => scaleFood(f, scaleFactor))) },
    { timing: '5:00 PM — Afternoon Snack', ...compose(snack.map((f) => scaleFood(f, scaleFactor))) },
    { timing: '4:00 PM — Pre Workout', ...compose(pre.map((f) => scaleFood(f, scaleFactor))) },
    { timing: '6:30 PM — Post Workout', ...compose(post.map((f) => scaleFood(f, scaleFactor))) },
    { timing: '9:00 PM — Dinner', ...compose(dinner.map((f) => scaleFood(f, scaleFactor))) },
  ];
}

const initialProfile = {
  age: '',
  currentWeight: '',
  targetWeight: '',
  height: '',
  goal: '',
  workoutLevel: '',
  dietType: '',
  workoutTime: '',
  timeline: '',
  monthlyBudget: '',
};

// localStorage helpers
const Storage = {
  PROFILE_KEY: 'ft_user_profile',
  PROGRESS_KEY: 'ft_progress_entries',
  
  saveProfile: (profile) => {
    try {
      localStorage.setItem(Storage.PROFILE_KEY, JSON.stringify(profile));
    } catch (err) {
      console.warn('Failed to save profile:', err);
    }
  },
  
  loadProfile: () => {
    try {
      const saved = localStorage.getItem(Storage.PROFILE_KEY);
      return saved ? JSON.parse(saved) : initialProfile;
    } catch (err) {
      console.warn('Failed to load profile:', err);
      return initialProfile;
    }
  },
  
  saveProgress: (entries) => {
    try {
      localStorage.setItem(Storage.PROGRESS_KEY, JSON.stringify(entries));
    } catch (err) {
      console.warn('Failed to save progress:', err);
    }
  },
  
  loadProgress: () => {
    try {
      const saved = localStorage.getItem(Storage.PROGRESS_KEY);
      return saved ? JSON.parse(saved) : [];
    } catch (err) {
      console.warn('Failed to load progress:', err);
      return [];
    }
  },
};

function ProgressTracker({ userProfile }) {
  const [progressEntries, setProgressEntries] = useState(() => Storage.loadProgress());
  const [newEntry, setNewEntry] = useState({ date: new Date().toISOString().split('T')[0], weight: '', chest: '', waist: '', image: null });
  const [imagePreview, setImagePreview] = useState(null);
  const [imageError, setImageError] = useState(null);
  const fileInputRef = useRef(null);

  // Supported image formats
  const SUPPORTED_FORMATS = ['image/jpeg', 'image/png', 'image/gif', 'image/webp', 'image/bmp', 'image/svg+xml', 'image/tiff', 'image/x-tiff', 'image/avif', 'image/jp2', 'image/x-icon'];
  const MAX_FILE_SIZE = 10 * 1024 * 1024; // 10MB

  const handleImageChange = (e) => {
    try {
      const file = e.target.files?.[0];
      setImageError(null);
      
      if (!file) return;

      // Validate file size
      if (file.size > MAX_FILE_SIZE) {
        setImageError(`File size exceeds 10MB limit. File size: ${(file.size / 1024 / 1024).toFixed(2)}MB`);
        return;
      }

      // Validate file type - check both MIME type and file extension
      const isSupportedMime = SUPPORTED_FORMATS.includes(file.type);
      const supportedExtensions = ['.jpg', '.jpeg', '.png', '.gif', '.webp', '.bmp', '.svg', '.tiff', '.tif', '.avif', '.jp2', '.ico'];
      const fileExtension = '.' + file.name.split('.').pop().toLowerCase();
      const isSupportedExtension = supportedExtensions.includes(fileExtension);

      if (!isSupportedMime && !isSupportedExtension) {
        setImageError(`Unsupported format. Supported: JPEG, PNG, GIF, WebP, BMP, SVG, TIFF, AVIF, JP2, ICO`);
        if (fileInputRef.current) fileInputRef.current.value = '';
        return;
      }

      // Read and convert to base64
      const reader = new FileReader();
      reader.onerror = () => {
        setImageError('Failed to read file. Please try another image.');
        if (fileInputRef.current) fileInputRef.current.value = '';
      };
      reader.onload = (event) => {
        try {
          const base64 = event.target?.result;
          if (base64) {
            setImagePreview(base64);
            setNewEntry(prev => ({ ...prev, image: base64 }));
            setImageError(null);
          }
        } catch (err) {
          setImageError('Error processing image: ' + (err?.message || 'Unknown error'));
        }
      };
      reader.readAsDataURL(file);
    } catch (err) {
      setImageError('Error with file input: ' + (err?.message || 'Unknown error'));
    }
  };

  const handleAddEntry = () => {
    if (!newEntry.date || !newEntry.weight) {
      alert('Please fill in date and weight');
      return;
    }
    const updated = [...progressEntries, { ...newEntry, id: Date.now() }].sort((a, b) => new Date(a.date) - new Date(b.date));
    setProgressEntries(updated);
    Storage.saveProgress(updated);
    setNewEntry({ date: new Date().toISOString().split('T')[0], weight: '', chest: '', waist: '', image: null });
    setImagePreview(null);
    setImageError(null);
    if (fileInputRef.current) fileInputRef.current.value = '';
  };

  const handleDeleteEntry = (id) => {
    const updated = progressEntries.filter(e => e.id !== id);
    setProgressEntries(updated);
    Storage.saveProgress(updated);
  };

  const chartData = progressEntries.map(e => ({ date: e.date, weight: Number(e.weight) }));
  const weightChange = chartData.length > 1 ? (chartData[chartData.length - 1].weight - chartData[0].weight).toFixed(1) : '0';
  const avgWeight = chartData.length > 0 ? (chartData.reduce((sum, d) => sum + d.weight, 0) / chartData.length).toFixed(1) : '0';

  return (
    <div className="rounded-2xl border border-zinc-800 bg-zinc-900 p-8">
      <h2 className="mb-6 text-3xl font-bold text-white">Progress Tracker 📊</h2>
      
      <div className="grid gap-6 lg:grid-cols-3 mb-8">
        <div className="rounded-xl border border-zinc-700 bg-zinc-800/50 p-5">
          <p className="text-xs text-zinc-400 mb-1 font-semibold">Total Entries</p>
          <p className="text-3xl font-bold text-orange-400">{progressEntries.length}</p>
        </div>
        <div className="rounded-xl border border-zinc-700 bg-zinc-800/50 p-5">
          <p className="text-xs text-zinc-400 mb-1 font-semibold">Weight Change</p>
          <p className="text-3xl font-bold text-emerald-400">{weightChange > 0 ? '+' : ''}{weightChange} kg</p>
        </div>
        <div className="rounded-xl border border-zinc-700 bg-zinc-800/50 p-5">
          <p className="text-xs text-zinc-400 mb-1 font-semibold">Average Weight</p>
          <p className="text-3xl font-bold text-yellow-400">{avgWeight} kg</p>
        </div>
      </div>

      <div className="mb-8 rounded-2xl border border-zinc-700 bg-zinc-800/30 p-6">
        <h3 className="text-lg font-bold text-white mb-4">Add New Entry</h3>
        <div className="grid gap-4 md:grid-cols-2">
          <div>
            <label className="mb-2 block text-xs font-semibold uppercase text-zinc-400">Date</label>
            <input type="date" value={newEntry.date} onChange={(e) => setNewEntry(prev => ({ ...prev, date: e.target.value }))} className="w-full rounded-lg border border-zinc-700 bg-zinc-800 px-3 py-2 text-white outline-none focus:border-orange-500" />
          </div>
          <div>
            <label className="mb-2 block text-xs font-semibold uppercase text-zinc-400">Weight (kg)</label>
            <input type="number" step="0.1" value={newEntry.weight} onChange={(e) => setNewEntry(prev => ({ ...prev, weight: e.target.value }))} placeholder="e.g. 75.5" className="w-full rounded-lg border border-zinc-700 bg-zinc-800 px-3 py-2 text-white placeholder-zinc-500 outline-none focus:border-orange-500" />
          </div>
          <div>
            <label className="mb-2 block text-xs font-semibold uppercase text-zinc-400">Chest (cm)</label>
            <input type="number" step="0.1" value={newEntry.chest} onChange={(e) => setNewEntry(prev => ({ ...prev, chest: e.target.value }))} placeholder="e.g. 95" className="w-full rounded-lg border border-zinc-700 bg-zinc-800 px-3 py-2 text-white placeholder-zinc-500 outline-none focus:border-orange-500" />
          </div>
          <div>
            <label className="mb-2 block text-xs font-semibold uppercase text-zinc-400">Waist (cm)</label>
            <input type="number" step="0.1" value={newEntry.waist} onChange={(e) => setNewEntry(prev => ({ ...prev, waist: e.target.value }))} placeholder="e.g. 85" className="w-full rounded-lg border border-zinc-700 bg-zinc-800 px-3 py-2 text-white placeholder-zinc-500 outline-none focus:border-orange-500" />
          </div>
        </div>

        <div className="mt-4">
          <label className="mb-2 block text-xs font-semibold uppercase text-zinc-400">Progress Photo</label>
          <p className="text-xs text-zinc-500 mb-3">Supported formats: JPEG, PNG, GIF, WebP, BMP, SVG, TIFF, AVIF, JP2, ICO (Max 10MB)</p>
          {imageError && (
            <div className="mb-3 rounded-lg border border-red-500/50 bg-red-500/10 p-3">
              <p className="text-xs text-red-400">⚠️ {imageError}</p>
            </div>
          )}
          <div className="flex gap-4 items-start">
            <div>
              <input ref={fileInputRef} type="file" accept=".jpg,.jpeg,.png,.gif,.webp,.bmp,.svg,.tiff,.tif,.avif,.jp2,.ico,image/*" onChange={handleImageChange} className="hidden" />
              <button type="button" onClick={() => fileInputRef.current?.click()} className="rounded-lg bg-orange-500 px-4 py-2 text-sm font-bold text-black hover:bg-orange-400 transition-colors">📷 Upload Image</button>
            </div>
            {imagePreview && (
              <div className="relative">
                <img src={imagePreview} alt="preview" className="h-20 w-20 rounded-lg object-cover border border-orange-500/50" />
                <button type="button" onClick={() => { setImagePreview(null); setNewEntry(prev => ({ ...prev, image: null })); setImageError(null); if (fileInputRef.current) fileInputRef.current.value = ''; }} className="absolute -top-2 -right-2 bg-red-500 rounded-full w-6 h-6 flex items-center justify-center text-white text-xs font-bold hover:bg-red-600">✕</button>
              </div>
            )}
          </div>
        </div>

        <button type="button" onClick={handleAddEntry} className="mt-4 w-full rounded-lg bg-emerald-500 py-2.5 text-sm font-bold text-white hover:bg-emerald-400 transition-colors">✓ Save Entry</button>
      </div>

      {chartData.length > 0 && (
        <div className="mb-8 rounded-2xl border border-zinc-700 bg-zinc-800/30 p-6">
          <h3 className="text-lg font-bold text-white mb-4">Weight Progress Chart</h3>
          <div className="bg-black/30 p-4 rounded-lg h-64 flex items-end gap-1 justify-center">
            {(() => {
              const minWeight = Math.min(...chartData.map(d => d.weight));
              const maxWeight = Math.max(...chartData.map(d => d.weight));
              const range = maxWeight - minWeight || 1;
              return chartData.map((point, i) => {
                const heightPercent = ((point.weight - minWeight) / range) * 100;
                return (
                  <div key={i} className="flex flex-col items-center flex-1" title={`${point.date}: ${point.weight} kg`}>
                    <div className="relative w-full flex flex-col items-center">
                      <div className="w-full bg-gradient-to-t from-orange-500 to-orange-300 rounded-t" style={{ height: `${heightPercent}%`, minHeight: '4px' }} />
                      <span className="text-[10px] text-zinc-400 mt-1 whitespace-nowrap">{point.date.slice(5)}</span>
                    </div>
                  </div>
                );
              });
            })()}
          </div>
        </div>
      )}

      {chartData.length > 1 && (
        <div className="mb-8 rounded-2xl border border-zinc-700 bg-zinc-800/30 p-6">
          <h3 className="text-lg font-bold text-white mb-4">Weight Trend Line</h3>
          <svg className="w-full h-64 bg-black/30 rounded-lg" viewBox="0 0 1000 300" preserveAspectRatio="xMidYMid meet">
            <defs>
              <linearGradient id="weightGradient" x1="0%" y1="0%" x2="0%" y2="100%">
                <stop offset="0%" style={{ stopColor: '#fb923c', stopOpacity: 0.3 }} />
                <stop offset="100%" style={{ stopColor: '#fb923c', stopOpacity: 0 }} />
              </linearGradient>
            </defs>
            <rect width="1000" height="300" fill="none" />
            
            {(() => {
              const minW = Math.min(...chartData.map(d => d.weight));
              const maxW = Math.max(...chartData.map(d => d.weight));
              const range = maxW - minW || 1;
              const padding = 30;
              const chartWidth = 1000 - padding * 2;
              const chartHeight = 300 - padding * 2;
              
              const points = chartData.map((d, i) => ({
                x: padding + (i / (chartData.length - 1 || 1)) * chartWidth,
                y: padding + ((maxW - d.weight) / range) * chartHeight,
                weight: d.weight
              }));
              
              const pathData = points.map((p, i) => `${i === 0 ? 'M' : 'L'} ${p.x} ${p.y}`).join(' ');
              const areaData = `${pathData} L ${points[points.length - 1].x} ${300 - padding} L ${points[0].x} ${300 - padding} Z`;
              
              return (
                <>
                  <path d={areaData} fill="url(#weightGradient)" />
                  <path d={pathData} stroke="#f97316" strokeWidth="3" fill="none" strokeLinecap="round" strokeLinejoin="round" />
                  {points.map((p, i) => (
                    <g key={i}>
                      <circle cx={p.x} cy={p.y} r="5" fill="#f97316" stroke="#1f2937" strokeWidth="2" />
                      <text x={p.x} y={p.y - 12} textAnchor="middle" fill="#fbbf24" fontSize="12" fontFamily="sans-serif" fontWeight="bold">{p.weight.toFixed(1)}</text>
                    </g>
                  ))}
                  <line x1={padding} y1={300 - padding} x2={1000 - padding} y2={300 - padding} stroke="#3f3f46" strokeWidth="1" />
                  <line x1={padding} y1={padding} x2={padding} y2={300 - padding} stroke="#3f3f46" strokeWidth="1" />
                  {points.map((p, i) => (
                    <text key={`date-${i}`} x={p.x} y={300 - padding + 20} textAnchor="middle" fill="#71717a" fontSize="10" fontFamily="sans-serif">{chartData[i].date.slice(5)}</text>
                  ))}
                </>
              );
            })()}
          </svg>
        </div>
      )}

      {progressEntries.some(e => e.chest || e.waist) && (
        <div className="mb-8 grid gap-6 lg:grid-cols-2">
          {progressEntries.some(e => e.chest) && (
            <div className="rounded-2xl border border-zinc-700 bg-zinc-800/30 p-6">
              <h3 className="text-lg font-bold text-white mb-4">Chest Progress</h3>
              <svg className="w-full h-48 bg-black/30 rounded-lg" viewBox="0 0 500 200" preserveAspectRatio="xMidYMid meet">
                {(() => {
                  const chestData = progressEntries.filter(e => e.chest).map(e => ({ date: e.date, value: Number(e.chest) }));
                  if (chestData.length === 0) return null;
                  
                  const minC = Math.min(...chestData.map(d => d.value));
                  const maxC = Math.max(...chestData.map(d => d.value));
                  const range = maxC - minC || 1;
                  const padding = 20;
                  const width = 500 - padding * 2;
                  const height = 200 - padding * 2;
                  
                  return (
                    <>
                      {chestData.map((d, i) => {
                        const x = padding + (i / (chestData.length - 1 || 1)) * width;
                        const y = padding + ((maxC - d.value) / range) * height;
                        return (
                          <g key={i}>
                            <rect x={x - 6} y={y} width="12" height={200 - padding - y} fill="#06b6d4" opacity="0.3" />
                            <circle cx={x} cy={y} r="4" fill="#06b6d4" stroke="#0f172a" strokeWidth="1" />
                            <text x={x} y={y - 8} textAnchor="middle" fill="#67e8f9" fontSize="11" fontWeight="bold">{d.value}</text>
                          </g>
                        );
                      })}
                      <line x1={padding} y1={200 - padding} x2={500 - padding} y2={200 - padding} stroke="#3f3f46" strokeWidth="1" />
                      <text x={padding - 15} y={padding + 10} fill="#71717a" fontSize="10">cm</text>
                    </>
                  );
                })()}
              </svg>
            </div>
          )}
          
          {progressEntries.some(e => e.waist) && (
            <div className="rounded-2xl border border-zinc-700 bg-zinc-800/30 p-6">
              <h3 className="text-lg font-bold text-white mb-4">Waist Progress</h3>
              <svg className="w-full h-48 bg-black/30 rounded-lg" viewBox="0 0 500 200" preserveAspectRatio="xMidYMid meet">
                {(() => {
                  const waistData = progressEntries.filter(e => e.waist).map(e => ({ date: e.date, value: Number(e.waist) }));
                  if (waistData.length === 0) return null;
                  
                  const minW = Math.min(...waistData.map(d => d.value));
                  const maxW = Math.max(...waistData.map(d => d.value));
                  const range = maxW - minW || 1;
                  const padding = 20;
                  const width = 500 - padding * 2;
                  const height = 200 - padding * 2;
                  
                  return (
                    <>
                      {waistData.map((d, i) => {
                        const x = padding + (i / (waistData.length - 1 || 1)) * width;
                        const y = padding + ((maxW - d.value) / range) * height;
                        return (
                          <g key={i}>
                            <rect x={x - 6} y={y} width="12" height={200 - padding - y} fill="#ec4899" opacity="0.3" />
                            <circle cx={x} cy={y} r="4" fill="#ec4899" stroke="#0f172a" strokeWidth="1" />
                            <text x={x} y={y - 8} textAnchor="middle" fill="#f472b6" fontSize="11" fontWeight="bold">{d.value}</text>
                          </g>
                        );
                      })}
                      <line x1={padding} y1={200 - padding} x2={500 - padding} y2={200 - padding} stroke="#3f3f46" strokeWidth="1" />
                      <text x={padding - 15} y={padding + 10} fill="#71717a" fontSize="10">cm</text>
                    </>
                  );
                })()}
              </svg>
            </div>
          )}
        </div>
      )}

      {chartData.length > 0 && (
        <div className="mb-8 rounded-2xl border border-zinc-700 bg-zinc-800/30 p-6">
          <h3 className="text-lg font-bold text-white mb-4">📈 Progress Statistics</h3>
          <div className="grid gap-4 md:grid-cols-2">
            {(() => {
              const firstEntry = chartData[0];
              const lastEntry = chartData[chartData.length - 1];
              const weightDiff = lastEntry.weight - firstEntry.weight;
              const days = Math.max(1, (new Date(lastEntry.date) - new Date(firstEntry.date)) / (1000 * 60 * 60 * 24));
              const velocityPerDayNum = weightDiff / days;
              const velocityPerDay = velocityPerDayNum.toFixed(2);
              const velocityPerWeek = (velocityPerDayNum * 7).toFixed(2);
              
              const chestEntries = progressEntries.filter(e => e.chest).map(e => Number(e.chest));
              const chestChange = chestEntries.length > 1 ? (chestEntries[chestEntries.length - 1] - chestEntries[0]).toFixed(1) : '0';
              
              const waistEntries = progressEntries.filter(e => e.waist).map(e => Number(e.waist));
              const waistChange = waistEntries.length > 1 ? (waistEntries[waistEntries.length - 1] - waistEntries[0]).toFixed(1) : '0';
              
              return (
                <>
                  <div className="rounded-lg border border-zinc-700 bg-zinc-900/50 p-4">
                    <p className="text-xs text-zinc-400 mb-1 font-semibold">Weight Change</p>
                    <p className="text-2xl font-bold text-orange-400">{weightDiff > 0 ? '+' : ''}{weightDiff.toFixed(1)} kg</p>
                    <p className="text-xs text-zinc-500 mt-1">Period: {Math.floor(days)} days</p>
                  </div>
                  <div className="rounded-lg border border-zinc-700 bg-zinc-900/50 p-4">
                    <p className="text-xs text-zinc-400 mb-1 font-semibold">Weekly Velocity</p>
                    <p className="text-2xl font-bold text-cyan-400">{velocityPerWeek > 0 ? '+' : ''}{velocityPerWeek} kg/week</p>
                    <p className="text-xs text-zinc-500 mt-1">Daily: {velocityPerDay > 0 ? '+' : ''}{velocityPerDay} kg</p>
                  </div>
                  {chestEntries.length > 0 && (
                    <div className="rounded-lg border border-zinc-700 bg-zinc-900/50 p-4">
                      <p className="text-xs text-zinc-400 mb-1 font-semibold">Chest Change</p>
                      <p className="text-2xl font-bold text-cyan-400">{chestChange > 0 ? '+' : ''}{chestChange} cm</p>
                      <p className="text-xs text-zinc-500 mt-1">Entries: {chestEntries.length}</p>

function DoubtSolver() {
  const [searchQuery, setSearchQuery] = useState('');
  const [selectedCategory, setSelectedCategory] = useState('All');
  const [showSuggestions, setShowSuggestions] = useState(false);

  const categories = ['All', 'Myths', 'Nutrition', 'Training', 'Recovery', 'Supplements', 'Transformation', 'Plateau', 'Injury Prevention', 'Women\'s Fitness', 'Age & Genetics', 'Mental', 'Body Recomposition', 'Beginner', 'Diet Specifics', 'Training Splits', 'Lifestyle', 'Natural vs Enhanced', 'Advanced Training', 'Alcohol', 'Special Situations', 'Soreness', 'Overtraining', 'Mind-Muscle', 'Mobility', 'Hydration', 'Post-Workout', 'Calorie Calculator', 'Macros', 'Exercise Form', 'Muscle Fiber', 'Tracking', 'Common Myths', 'Rest Periods', 'Workout Duration', 'Muscle Groups', 'Cardio', 'Water Retention', 'Sleep Quality', 'Maintenance', 'Performance', 'Hunger', 'Timelines', 'Rep Ranges', 'Deficiencies', 'Pre-Workout', 'Recovery Tools', 'Stress', 'Partner Training', 'Lift Form', 'Equipment', 'Supplement Safety', 'Hormones', 'Gym Situations', 'Caffeine', 'Legs'];

  const searchSuggestions = useMemo(() => {
    if (!searchQuery.trim()) return [];
    
    const query = searchQuery.toLowerCase();
    const suggestions = DOUBT_DATABASE.filter(item => 
      item.doubt.toLowerCase().includes(query) ||
      item.answer.toLowerCase().includes(query)
    ).slice(0, 8).map(item => ({
      text: item.doubt,
      category: item.category,
      icon: item.icon
    }));
    
    // Remove duplicates and return
    const seen = new Set();
    return suggestions.filter(s => {
      if (seen.has(s.text)) return false;
      seen.add(s.text);
      return true;
    });
  }, [searchQuery]);

  const filteredDoubts = useMemo(() => {
    return DOUBT_DATABASE.filter(item => {
      const matchesCategory = selectedCategory === 'All' || item.category === selectedCategory;
      const matchesSearch = item.doubt.toLowerCase().includes(searchQuery.toLowerCase()) ||
                           item.answer.toLowerCase().includes(searchQuery.toLowerCase()) ||
                           item.category.toLowerCase().includes(searchQuery.toLowerCase());
      return matchesCategory && matchesSearch;
    });
  }, [searchQuery, selectedCategory]);

  const handleSuggestionClick = (suggestionText) => {
    setSearchQuery(suggestionText);
    setShowSuggestions(false);
  };

  return (
    <div className="rounded-2xl border border-zinc-800 bg-zinc-900 p-8">
      <h2 className="mb-2 text-3xl font-bold text-white">💡 Doubt Solving Engine</h2>
      <p className="mb-6 text-sm text-zinc-400">Get clarity on fitness myths, nutrition, training, and recovery. Evidence-based answers to common questions.</p>

      <div className="mb-6 flex gap-2 flex-wrap">
        {categories.map(cat => (
          <button
            key={cat}
            onClick={() => setSelectedCategory(cat)}
            className={`px-4 py-2 rounded-lg text-sm font-bold transition-colors ${
              selectedCategory === cat
                ? 'bg-orange-500 text-black'
                : 'bg-zinc-800 text-zinc-400 hover:bg-zinc-700'
            }`}
          >
            {cat}
          </button>
        ))}
      </div>

      <div className="mb-6 relative">
        <input
          type="text"
          placeholder="Search doubts, myths, nutrition tips..."
          value={searchQuery}
          onChange={(e) => {
            setSearchQuery(e.target.value);
            setShowSuggestions(true);
          }}
          onFocus={() => searchQuery && setShowSuggestions(true)}
          onBlur={() => setTimeout(() => setShowSuggestions(false), 200)}
          className="w-full rounded-lg border border-zinc-700 bg-zinc-800 px-4 py-3 text-white placeholder-zinc-500 outline-none focus:border-orange-500 focus:ring-1 focus:ring-orange-500"
        />
        
        {showSuggestions && searchSuggestions.length > 0 && (
          <div className="absolute top-full left-0 right-0 mt-2 bg-zinc-800 border border-zinc-700 rounded-lg shadow-lg z-50 max-h-96 overflow-y-auto">
            <div className="p-2">
              {searchSuggestions.map((suggestion, idx) => (
                <button
                  key={idx}
                  onClick={() => handleSuggestionClick(suggestion.text)}
                  className="w-full text-left px-4 py-3 rounded-lg hover:bg-zinc-700 transition-colors border-b border-zinc-700 last:border-b-0 flex items-center gap-3 group"
                >
                  <span className="text-lg">{suggestion.icon}</span>
                  <div className="flex-1 min-w-0">
                    <p className="text-white text-sm font-medium truncate group-hover:text-orange-400">{suggestion.text}</p>
                    <p className="text-xs text-zinc-500">{suggestion.category}</p>
                  </div>
                  <svg className="w-4 h-4 text-zinc-500 flex-shrink-0" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                    <path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2} d="M9 5l7 7-7 7" />
                  </svg>
                </button>
              ))}
            </div>
          </div>
        )}
      </div>

      <div className="space-y-4">
        {filteredDoubts.length > 0 ? (
          filteredDoubts.map(item => (
            <div key={item.id} className="rounded-xl border border-zinc-700 bg-zinc-800/50 p-5 hover:border-orange-500/50 transition-colors">
              <div className="flex gap-3">
                <span className="text-2xl">{item.icon}</span>
                <div className="flex-1">
                  <div className="flex items-center gap-2 mb-2">
                    <h3 className="font-bold text-white text-base">{item.doubt}</h3>
                    <span className="text-xs px-2 py-1 rounded-full bg-orange-500/20 text-orange-400">{item.category}</span>
                  </div>
                  <p className="text-sm text-zinc-300 leading-relaxed">{item.answer}</p>
                </div>
              </div>
            </div>
          ))
        ) : (
          <div className="rounded-xl border border-zinc-700 bg-zinc-800/30 p-8 text-center">
            <p className="text-zinc-400">No results found for "{searchQuery}". Try searching with different keywords.</p>
          </div>
        )}
      </div>

      <div className="mt-8 rounded-xl border border-zinc-700 bg-zinc-800/30 p-5">
        <p className="text-xs text-zinc-400">
          💬 <span className="font-semibold">Pro Tip:</span> Focus on the fundamentals—calories, protein, consistent training, adequate sleep, and progressive overload. These 5 things are 90% of your success. Everything else is details.
        </p>
      </div>
    </div>
  );
}

function buildDayGroups(muscles, db) {
  return muscles
    .map(({ muscle, n }) => {
      const g = db.find((x) => x.muscle === muscle);
      return g ? { ...g, exercises: g.exercises.slice(0, n) } : null;
    })
    .filter(Boolean);
}

  // For local testing: serves from local folder
  // For web deployment: change to your public hosting URL or ensure /videos/ folder exists on server
  basePath: '/3D Animation Videos/',  // Path relative to server root
  
  // Fallback for different server setups

    '/3D%20Animation%20Videos/',  // URL encoded space
    '/videos/',
    './3D Animation Videos/',
  ],
  
  // Add custom video URLs if using cloud storage (optional)
  customUrls: {
    // Example: 'Push-Ups': 'https://cdn.example.com/push-ups.mp4'
  }
};

function getExerciseVideoCandidates(exerciseName) {
  const exactMatch = exerciseToVideoMap[exerciseName];
  const normalized = exerciseName.toLowerCase();
  const matchedVideo = exactMatch || Object.entries(exerciseToVideoMap).find(([key]) => key.toLowerCase() === normalized)?.[1];

  if (!matchedVideo) {
    console.warn(`No video found for exercise: ${exerciseName}`);
    return [];
  }

  // Check if custom URL exists for this exercise
  if (VIDEO_CONFIG.customUrls[exerciseName]) {
    return [VIDEO_CONFIG.customUrls[exerciseName]];
  }

  const fileName = matchedVideo;
  
  // Build list of candidate paths to try
  const candidates = [];
  
  // Primary base path
  candidates.push(`${VIDEO_CONFIG.basePath}${fileName}`);
  
  // Fallback paths
  if (VIDEO_CONFIG.fallbackPaths) {
    VIDEO_CONFIG.fallbackPaths.forEach(basePath => {
      candidates.push(`${basePath}${fileName}`);
    });
  }
  
  // Additional paths for robustness
  if (window.location.protocol === 'file:') {
    candidates.push(`./3D Animation Videos/${fileName}`);
    candidates.push(`../3D Animation Videos/${fileName}`);
  }

  console.log(`Video candidates for "${exerciseName}":`, candidates);
  return candidates;
}

  const videoCandidates = getExerciseVideoCandidates(exercise);
  const [currentVideoIndex, setCurrentVideoIndex] = useState(0);
  const [isPlaying, setIsPlaying] = useState(false);
  const [isFullscreen, setIsFullscreen] = useState(false);
  const videoRef = useRef(null);
  const videoContainerRef = useRef(null);
  const videoPath = videoCandidates[currentVideoIndex] || null;

  useEffect(() => {
    setCurrentVideoIndex(0);
    setIsPlaying(false);
  }, [exercise]);

  useEffect(() => {
    if (!videoRef.current) return;
    const videoEl = videoRef.current;
    videoEl.muted = true;
    videoEl.volume = 0;
    videoEl.currentTime = 0;
    setIsPlaying(false);
  }, [videoPath]);

  const enforceMute = () => {
    if (!videoRef.current) return;
    videoRef.current.muted = true;
    videoRef.current.volume = 0;
  };

  const handleTogglePlay = () => {
    if (!videoRef.current) return;
    if (videoRef.current.paused) {
      videoRef.current.play().then(() => setIsPlaying(true)).catch(() => setIsPlaying(false));
    } else {
      videoRef.current.pause();
      setIsPlaying(false);
    }
  };

  const skipVideo = (seconds) => {
    if (!videoRef.current) return;
    const videoEl = videoRef.current;
    const nextTime = Math.max(0, Math.min(videoEl.duration || 0, videoEl.currentTime + seconds));
    videoEl.currentTime = nextTime;
  };

  const handleToggleFullscreen = () => {
    const container = videoContainerRef.current;
    if (!container) return;
    if (!isFullscreen) {
      try {
        if (container.requestFullscreen) {
          container.requestFullscreen();
        } else if (container.webkitRequestFullscreen) {
          container.webkitRequestFullscreen();
        } else if (container.msRequestFullscreen) {
          container.msRequestFullscreen();
        }
        setIsFullscreen(true);
      } catch (err) {
        console.warn('Fullscreen request failed:', err);
      }
    } else {
      try {
        if (document.fullscreenElement || document.webkitFullscreenElement) {
          if (document.exitFullscreen) {
            document.exitFullscreen();
          } else if (document.webkitExitFullscreen) {
            document.webkitExitFullscreen();
          } else if (document.mozCancelFullScreen) {
            document.mozCancelFullScreen();
          } else if (document.msExitFullscreen) {
            document.msExitFullscreen();
          }
        }
        setIsFullscreen(false);
      } catch (err) {
        console.warn('Fullscreen exit failed:', err);
        setIsFullscreen(false);
      }
    }
  };

  useEffect(() => {
    const handleFullscreenChange = () => {
      setIsFullscreen(Boolean(document.fullscreenElement || document.webkitFullscreenElement));
    };
    document.addEventListener('fullscreenchange', handleFullscreenChange);
    document.addEventListener('webkitfullscreenchange', handleFullscreenChange);
    return () => {
      document.removeEventListener('fullscreenchange', handleFullscreenChange);
      document.removeEventListener('webkitfullscreenchange', handleFullscreenChange);
    };
  }, []);

  const handleVideoError = (e) => {
    console.error(`Video load failed: ${videoPath}`);
    if (currentVideoIndex < videoCandidates.length - 1) {
      console.log(`Trying next video path (${currentVideoIndex + 1} of ${videoCandidates.length})...`);
      setCurrentVideoIndex((prevIndex) => prevIndex + 1);
      return;

        </div>
        
        {videoPath && (
          <div ref={videoContainerRef} className="mb-5 rounded-xl overflow-hidden bg-black/50 border border-zinc-700" style={isFullscreen ? { position: 'fixed', inset: 0, zIndex: 9999, borderRadius: 0 } : {}}>
            <div className="relative h-full">
              <video 
                key={videoPath}

                loop

                playsInline

function getSetScheme(level, goal) {
  const isStrength = goal === 'Strength Building';
  const isLoss = goal === 'Weight Loss';
  const isGain = goal === 'Lean Muscle Gain';

  if (level === 'Beginner') {
    if (isStrength) return { sets: 3, reps: '5–6', rest: '2 min' };
    if (isLoss) return { sets: 3, reps: '15–20', rest: '30s' };
    if (isGain) return { sets: 3, reps: '10–12', rest: '60s' };
    return { sets: 3, reps: '12–15', rest: '45s' };
  }
  if (level === 'Intermediate') {
    if (isStrength) return { sets: 4, reps: '4–6', rest: '3 min' };
    if (isLoss) return { sets: 4, reps: '12–15', rest: '45s' };
    if (isGain) return { sets: 4, reps: '8–10', rest: '90s' };
    return { sets: 4, reps: '10–12', rest: '60s' };
  }
  if (isStrength) return { sets: 5, reps: '3–5', rest: '3 min' };
  if (isLoss) return { sets: 4, reps: '15–20', rest: '30s' };
  if (isGain) return { sets: 5, reps: '6–8', rest: '2 min' };
  return { sets: 4, reps: '10–12', rest: '60s' };
}

  const currentExercises = selectedWorkoutLevel ? exerciseDatabase[selectedWorkoutLevel] : { home: [], gym: [] };
  const showWorkoutPlan = Boolean(selectedWorkoutLevel);

  const bmi = useMemo(() => {
    const weight = Number(userProfile.currentWeight);
    const heightCm = Number(userProfile.height);
    if (weight <= 0 || heightCm <= 0) return null;
    const heightM = heightCm / 100;
    return (weight / (heightM * heightM)).toFixed(1);
  }, [userProfile.currentWeight, userProfile.height]);

  const bmiCategory = useMemo(() => {
    if (!bmi) return '';
    const b = Number(bmi);
    if (b < 18.5) return 'Underweight';
    if (b < 25) return 'Normal';
    if (b < 30) return 'Overweight';
    return 'Obese';
  }, [bmi]);

  const calorieRange = useMemo(() => {
    const currentWeight = Number(userProfile.currentWeight);
    const targetWeight = Number(userProfile.targetWeight);
    const timeline = Number(userProfile.timeline);
    if (currentWeight <= 0 || targetWeight <= 0 || timeline <= 0) return '0–0 kcal';
    const totalCaloriesNeeded = Math.abs(targetWeight - currentWeight) * 7700;
    const rawDaily = totalCaloriesNeeded / (timeline * 30);
    const isGaining = targetWeight > currentWeight;
    const cappedSurplus = isGaining ? Math.min(rawDaily, 500) : Math.min(rawDaily, 750);
    let maintenanceCalories = currentWeight * 35;
    if (userProfile.workoutLevel === 'Intermediate') maintenanceCalories = currentWeight * 38;
    if (userProfile.workoutLevel === 'Advanced') maintenanceCalories = currentWeight * 41;
    let minimumCalories;
    let maximumCalories;
    if (isGaining) {
      minimumCalories = Math.round(maintenanceCalories + cappedSurplus);
      maximumCalories = minimumCalories + 200;
    } else {
      maximumCalories = Math.round(maintenanceCalories - cappedSurplus);
      minimumCalories = Math.max(1200, maximumCalories - 200);
    }
    return `${minimumCalories}–${maximumCalories} kcal`;
  }, [userProfile.currentWeight, userProfile.targetWeight, userProfile.timeline, userProfile.workoutLevel]);

  const suggestion = useMemo(() => {
    const currentWeight = Number(userProfile.currentWeight);

    const timeline = Number(userProfile.timeline);
    if (currentWeight <= 0 || targetWeight <= 0 || timeline <= 0) {
      return 'Enter your transformation details to receive smart fitness suggestions.';
    }
    const monthlyChange = Math.abs(targetWeight - currentWeight) / timeline;

            <h2 className="mb-2 text-3xl font-bold text-white">Your Fitness Profile</h2>
            <p className="mb-8 text-zinc-400 text-sm">Fill in your details to generate a personalized transformation plan.</p>
            <div className="grid gap-4 md:grid-cols-2 xl:grid-cols-4">
              {[
                ['Age', 'age', 'Enter age'],
                ['Current Weight (kg)', 'currentWeight', 'e.g. 80'],
                ['Target Weight (kg)', 'targetWeight', 'e.g. 70'],
                ['Height (cm)', 'height', 'e.g. 175'],
              ].map(([label, field, placeholder]) => (
                <div key={field}>
                  <label className="mb-1.5 block text-xs font-semibold uppercase tracking-wider text-zinc-400">{label}</label>
                  <input type="number" min="1" value={userProfile[field]} onChange={(e) => handleInputChange(field, e.target.value)} placeholder={placeholder} className="w-full rounded-xl border border-zinc-700 bg-zinc-800 px-4 py-3 text-white placeholder-zinc-500 outline-none focus:border-orange-500 transition-colors" />
                </div>
              ))}
              <div>
                <label className="mb-1.5 block text-xs font-semibold uppercase tracking-wider text-zinc-400">Goal</label>
                <select value={userProfile.goal} onChange={(e) => handleInputChange('goal', e.target.value)} className="w-full rounded-xl border border-zinc-700 bg-zinc-800 px-4 py-3 text-white outline-none focus:border-orange-500 transition-colors">
                  <option value="">Select Goal</option>
                  <option>Lean Muscle Gain</option>
                  <option>Weight Loss</option>
                  <option>Body Recomposition</option>
                  <option>Strength Building</option>
                  <option>Maintain Weight</option>
                </select>
              </div>
              <div>
                <label className="mb-1.5 block text-xs font-semibold uppercase tracking-wider text-zinc-400">Workout Level</label>
                <select value={userProfile.workoutLevel} onChange={(e) => handleInputChange('workoutLevel', e.target.value)} className="w-full rounded-xl border border-zinc-700 bg-zinc-800 px-4 py-3 text-white outline-none focus:border-orange-500 transition-colors">
                  <option value="">Select Level</option>
                  <option>Beginner</option>
                  <option>Intermediate</option>
                  <option>Advanced</option>
                </select>
              </div>
              <div>
                <label className="mb-1.5 block text-xs font-semibold uppercase tracking-wider text-zinc-400">Diet Type</label>
                <select value={userProfile.dietType} onChange={(e) => handleInputChange('dietType', e.target.value)} className="w-full rounded-xl border border-zinc-700 bg-zinc-800 px-4 py-3 text-white outline-none focus:border-orange-500 transition-colors">
                  <option value="">Select Diet</option>
                  <option>Vegetarian</option>
                  <option>Non Vegetarian</option>
                  <option>Vegan</option>
                  <option>Omnivore (Mixed)</option>
                </select>
              </div>
              <div>
                <label className="mb-1.5 block text-xs font-semibold uppercase tracking-wider text-zinc-400">Workout Time</label>
                <input type="text" value={userProfile.workoutTime} onChange={(e) => handleInputChange('workoutTime', e.target.value)} placeholder="e.g. 6 AM or 6 PM" className="w-full rounded-xl border border-zinc-700 bg-zinc-800 px-4 py-3 text-white placeholder-zinc-500 outline-none focus:border-orange-500 transition-colors" />
              </div>
              <div>
                <label className="mb-1.5 block text-xs font-semibold uppercase tracking-wider text-zinc-400">Timeline (Months)</label>
                <input type="number" min="1" value={userProfile.timeline} onChange={(e) => handleInputChange('timeline', e.target.value)} placeholder="e.g. 3" className="w-full rounded-xl border border-zinc-700 bg-zinc-800 px-4 py-3 text-white placeholder-zinc-500 outline-none focus:border-orange-500 transition-colors" />
              </div>
              <div>
                <label className="mb-1.5 block text-xs font-semibold uppercase tracking-wider text-zinc-400">Monthly Diet Budget (₹)</label>
                <input type="number" min="0" value={userProfile.monthlyBudget} onChange={(e) => handleInputChange('monthlyBudget', e.target.value)} placeholder="e.g. 5000" className="w-full rounded-xl border border-zinc-700 bg-zinc-800 px-4 py-3 text-white placeholder-zinc-500 outline-none focus:border-orange-500 transition-colors" />
              </div>
            </div>
            <div className="mt-6 rounded-xl border border-orange-500/40 bg-orange-500/5 p-5">
              <p className="text-sm font-semibold text-orange-400 mb-1">Smart Suggestion</p>
              <p className="text-zinc-300 text-sm leading-relaxed">{suggestion}</p>
            </div>
            <div className="mt-6 grid gap-4 md:grid-cols-3">
              <div className="rounded-xl border border-zinc-700 bg-zinc-800/50 p-5">
                <p className="text-2xl font-bold text-orange-400">{userProfile.currentWeight || '—'} → {userProfile.targetWeight || '—'} kg</p>
                <p className="mt-1 text-sm text-zinc-400">{userProfile.goal || 'Transformation Goal'}</p>
              </div>
              <div className="rounded-xl border border-zinc-700 bg-zinc-800/50 p-5">
                <p className="text-2xl font-bold text-yellow-400">{calorieRange}</p>
                <p className="mt-1 text-sm text-zinc-400">Daily Calorie Target</p>
              </div>
              <div className="rounded-xl border border-zinc-700 bg-zinc-800/50 p-5">
                <p className="text-2xl font-bold text-emerald-400">{userProfile.timeline || '—'} Months</p>
                <p className="mt-1 text-sm text-zinc-400">Transformation Timeline</p>
              </div>
            </div>
          </div>
          {roadmap.length > 0 && (
            <div className="mb-10">
              <h2 className="mb-4 text-2xl font-bold text-white">Monthly Roadmap</h2>
              <div className="grid gap-4 sm:grid-cols-2 md:grid-cols-3 xl:grid-cols-4">
                {roadmap.map((plan) => (
                  <div key={plan.month} className="rounded-2xl border border-zinc-800 bg-zinc-900 p-6 hover:border-orange-500/50 transition-colors">
                    <h3 className="mb-3 text-lg font-bold text-orange-400">{plan.month}</h3>
                    <div className="space-y-2 text-sm mb-5">
                      <p><span className="text-zinc-400">Goal:</span> <span className="text-white font-medium">{plan.goal}</span></p>
                      <p><span className="text-zinc-400">Calories:</span> <span className="text-yellow-400 font-medium">{plan.calories}</span></p>
                      <p><span className="text-zinc-400">Protein:</span> <span className="text-emerald-400 font-medium">{plan.protein}</span></p>
                    </div>
                    <button type="button" onClick={() => setSelectedPlan(plan)} className="w-full rounded-xl bg-orange-500 py-2.5 text-sm font-bold text-black hover:bg-orange-400 transition-colors">View Diet Plan</button>
                  </div>
                ))}
              </div>
            </div>
          )}
          <div className="mb-6">
            <div className="mb-4 flex flex-wrap gap-2">
              {WEEKLY_SPLIT.map((d, i) => (
                <button key={d.day} type="button" onClick={() => setSelectedDay(i)} className={`rounded-xl px-3 py-2 text-xs font-bold transition-all ${selectedDay === i ? 'bg-orange-500 text-black shadow-lg shadow-orange-500/30' : 'bg-zinc-800 text-zinc-400 hover:bg-zinc-700 hover:text-white'}`}>
                  <span className="block">{d.day}</span>
                  <span className={`block text-[10px] font-normal mt-0.5 ${selectedDay === i ? 'text-black/70' : 'text-zinc-500'}`}>{d.focus.length > 14 ? d.focus.slice(0, 13) + '…' : d.focus}</span>
                </button>
              ))}
            </div>
            <div className="mb-4 rounded-xl border border-zinc-700 bg-zinc-800/50 px-4 py-3 flex items-center justify-between">
              <div>
                <span className="text-base font-bold text-white">{dayPlan.label}</span>
                <span className="ml-2 text-sm text-zinc-400">— {dayPlan.focus}</span>
              </div>
              <span className="text-xs text-zinc-500">Day {selectedDay + 1} / 7</span>
            </div>
            {showWorkoutPlan ? (
              <div className="grid gap-5 lg:grid-cols-2">
                <ExercisePanel groups={homeGroups} title="🏠 Home Workout" titleColor="text-emerald-400" badgeColor="bg-emerald-500/20 text-emerald-300 border-emerald-500/30" />
                <ExercisePanel groups={gymGroups} title="🏋️ Gym Workout" titleColor="text-orange-400" badgeColor="bg-orange-500/20 text-orange-300 border-orange-500/30" />
              </div>
            ) : (
              <div className="rounded-2xl border border-zinc-800 bg-zinc-900 p-8 text-center text-zinc-400">
                <p className="text-lg font-semibold text-white mb-2">Workout plan hidden</p>
                <p>Select a workout level above to see your weekly exercise plan.</p>
              </div>
            )}
          </div>
          <div className="rounded-2xl border border-zinc-800 bg-zinc-900 p-6">
            <h2 className="mb-4 text-xl font-bold text-yellow-400">BMI Calculator</h2>
            <div className="grid gap-3 sm:grid-cols-3">
              <div className="rounded-lg bg-zinc-800 px-4 py-3">
                <p className="text-xs text-zinc-400 mb-1">Weight</p>
                <p className="text-sm text-zinc-200 font-semibold">{userProfile.currentWeight ? `${userProfile.currentWeight} kg` : '—'}</p>
              </div>
              <div className="rounded-lg bg-zinc-800 px-4 py-3">
                <p className="text-xs text-zinc-400 mb-1">Height</p>
                <p className="text-sm text-zinc-200 font-semibold">{userProfile.height ? `${userProfile.height} cm` : '—'}</p>
              </div>
              <div className="rounded-xl bg-zinc-800 px-4 py-3 flex items-center gap-4">
                <div>
                  <p className="text-xs text-zinc-400 uppercase tracking-widest mb-1">BMI</p>
                  <p className="text-3xl font-black text-orange-400">{bmi || '—'}</p>
                </div>
                {bmiCategory && (
                  <span className={`rounded-full px-3 py-1 text-xs font-bold ${bmiCategory === 'Normal' ? 'bg-emerald-500/20 text-emerald-400' : bmiCategory === 'Underweight' ? 'bg-blue-500/20 text-blue-400' : 'bg-red-500/20 text-red-400'}`}>{bmiCategory}</span>
                )}
              </div>
            </div>
          </div>
          <ProgressTracker userProfile={userProfile} />
          <DoubtSolver />
        </section>
      </main>
      {selectedPlan && (
        <div className="fixed inset-0 z-50 flex items-center justify-center bg-black/80 p-4 backdrop-blur-sm">
          <div className="max-h-[90vh] w-full max-w-2xl overflow-y-auto rounded-2xl border border-zinc-700 bg-zinc-900 p-8 shadow-2xl">
            <div className="mb-6 flex items-center justify-between">
              <div>
                <h2 className="text-2xl font-bold text-white">{selectedPlan.month} Diet Plan</h2>
                <p className="text-sm text-zinc-400 mt-1">Goal: {selectedPlan.goal}</p>
                <div className="flex flex-wrap gap-2 mt-2">
                  {(() => {
                    const b = Number(userProfile.monthlyBudget);
                    const tier = b > 7000 ? { label: 'Premium Tier', sub: '>₹7000/mo', color: 'bg-yellow-500/20 text-yellow-300 border-yellow-500/40' }
                      : b > 3000 ? { label: 'Standard Tier', sub: '₹3001–7000/mo', color: 'bg-blue-500/20 text-blue-300 border-blue-500/40' }
                      : b > 0 ? { label: 'Basic Tier', sub: '≤₹3000/mo', color: 'bg-zinc-500/20 text-zinc-300 border-zinc-500/40' }
                      : { label: 'Standard Tier', sub: 'Default', color: 'bg-blue-500/20 text-blue-300 border-blue-500/40' };
                    return (
                      <span className={`inline-flex items-center gap-1 rounded-full border px-2.5 py-0.5 text-xs font-semibold ${tier.color}`}>{tier.label} <span className="opacity-70">({tier.sub})</span></span>
                    );
                  })()}
                  {userProfile.dietType && (
                    <span className="inline-flex items-center rounded-full border border-orange-500/40 bg-orange-500/20 px-2.5 py-0.5 text-xs font-semibold text-orange-300">{userProfile.dietType}</span>
                  )}
                </div>
              </div>
              <button type="button" onClick={() => setSelectedPlan(null)} className="rounded-lg bg-zinc-700 px-4 py-2 text-sm font-semibold text-white hover:bg-zinc-600 transition-colors">Close</button>
            </div>
            <div className="space-y-4">
              {selectedPlan.meals?.map((meal, index) => (
                <div key={index} className="rounded-xl border border-zinc-700 bg-zinc-800 p-5">
                  <h3 className="font-bold text-orange-400 mb-3">{meal.timing}</h3>
                  <div className="space-y-2 text-sm">
                    <p><span className="text-zinc-400">Meal:</span> <span className="text-white ml-2">{meal.meal}</span></p>
                    <p><span className="text-zinc-400">Quantity:</span> <span className="text-white ml-2">{meal.quantity}</span></p>
                    <p><span className="text-zinc-400">Nutrition:</span> <span className="text-yellow-400 ml-2 font-medium">{meal.nutrition}</span></p>
                  </div>
                </div>
              ))}
            </div>
          </div>
        </div>
      )}
      {selectedExercise && (
        <ExerciseDetailModal exercise={selectedExercise.name} muscleGroup={selectedExercise.muscle} scheme={scheme} onClose={() => setSelectedExercise(null)} />
      )}
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App />);
  </script>
</body>
</html>
